[package]
name = "deterministic_replication"
version = "0.26.4"
authors = ["Charles Bournhonesque <charlesbour@gmail.com>"]
edition.workspace = true
publish = false

[features]
default = ["client", "gui", "server", "netcode", "udp"]
client = [
  "lightyear/client",
  "lightyear/server",
  "lightyear_examples_common/client",
  "lightyear_examples_common/server",
]
gui = ["lightyear_examples_common/gui2d"]
server = [
  "lightyear/client",
  "lightyear/server",
  "lightyear_examples_common/client",
  "lightyear_examples_common/server",
]
netcode = ["lightyear_examples_common/netcode"]
udp = ["lightyear_examples_common/udp", "lightyear/std", "lightyear/udp"]

[dependencies]
lightyear = { workspace = true, features = [
  "interpolation",
  "prediction",
  "replication",
  "leafwing",
  "deterministic",
] }
lightyear_deterministic_replication.workspace = true
lightyear_examples_common.workspace = true
lightyear_frame_interpolation.workspace = true
leafwing-input-manager.workspace = true
# add avian2d directly to customize the plugin 
lightyear_avian2d = { workspace = true, features = ["deterministic", "2d"] }
avian2d = { workspace = true, features = [
  "2d",
  "f32",
  "parry-f32",
  "parallel",
  "serialize",
  "enhanced-determinism",
] }

serde.workspace = true
bevy.workspace = true
bevy_replicon.workspace = true
lightyear_replication.workspace = true

[package.metadata.bevy_cli.web]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]
default-features = false
features = ["client", "netcode"]

[lints]
workspace = true
